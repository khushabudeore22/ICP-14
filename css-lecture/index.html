<!DOCTYPE html>
<html>

<head>
    <title>CSS</title>
    <style>
        h1 {
            color: tomato;
        }

        .demo {
            color: blue;
            background-color: lightgray;
        }

        #css {
            color: darkgreen;
            background-color: azure;
        }

        .google-btn {
            background-color: #93aacd;
            color: white;
            height: 50px;
            width: 120px;
        }
    </style>
</head>

<body>
    Using Tag Name:-
    <h1>Hello, Good morning</h1>
    <hr />

    Using Class Name:-( . is used to declare a selector)
    <p class="demo">My name is khushabu tarachand deore. i am from joran.i am persuing BE in electonics and computer engineering</p>
    <hr />

    using id name:-(#is used to declare selector)
    <h1 id="css">CSS is interesting</h1><br/>
    <hr />

    height width property:-<br/>
    <button class="google-btn">Start Recording</button><hr/>
</body>
</html>
