<!DOCTYPE html>
<html>
<head>
    <title>Form Tag</title>
</head>
<body>
    <form>
        <h1>Checkbox with Checked attribute:</h1>

        <input type="checkbox" id="checkbox1" checked="true"/>
        <label for="checkbox1">Html</label><br/>

        <input type="checkbox" id="checkbox2"/>
        <label for="checkbox2">CSS</label><br/>

        <input type="checkbox" id="checkbox3"/>
        <label for="checkbox3">Javascript</label><hr/>
    </form>

    <form>
        <h1>RadioButton Attribute</h1>
        <input type="radio" name="Gender" id="radio1" />
        <label for="radio1">Male</label><br/>

        <input type="radio" name="Gender" id="radio2"/>
        <label for="radio2">Female</label><hr/>
    </form>
</body>
</html>
