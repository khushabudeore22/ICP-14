<!DOCTYPE html>
<html>
<head>
    <title>Form Tag</title>
</head>
<body>
    <form>
        <h2>Input Tag</h2>
        <input type="text"/><br/><hr/>

        <h2>Label TAG</h2>
        <label for="nameinput">ENTER YOUR NAME:</label>
        <input type="Name" id="nameinput"/><br/><hr/>

        <h2>Password Attribute</h2>
        <label for="passwordinput">ENTER YOUR PASSWORD:</label>
        <input type="password" id="passwordinput"/><br/><hr/>

        <h2>Email Attribute</h2>
        <label for="emailinput">Enter Your Email:</label>
        <input type="email"id="emailinput"/><br/><hr/>

        <h1>Types Of Button:- 1) Button</h1>
        <input type="button" value="click Me"/><br/>

        <h1>2)Submit</h1>
        <input type="submit" value="Register Now"/><br/><hr/>

        <h2>Sample Code Using Label,input Tag And password,email,required,button and submit attributes</h2>

        <label for="fullname">Enter Your Full Name</label>
        <input type="text" id="fullname" required/><br/><br/>

        <label for="email">Enter Your Email</label>
        <input type="email" id="email" required/><br/><br/>

        <label for="password">Enter Your Password</label>
        <input type="password" id="password" required/><br/><br/>

        <input type="submit" value="Register Now" required/><hr/>

        <h1>PlaceHolder Atrribute</h1>
        <input type="text" placeholder="Enter Your Full NAme"/><hr/>
    </form>
</body>
</html>
