<!DOCTYPE html>
<html>
<head>
    <title>Ordered And Unordered List</title>
</head>
<body>
    <h1>This Is Unordered List...!!!</h1>
    <ul type="disc">
        <li>Mango</li>
        <li>Strawberry</li>
        <li>Banana</li>
        <li>Avacado</li>
        <li>Grapes</li>
        <li>Blackberry</li>
        <li>Watermelon</li>
    </ul>
    <hr/>
    <h1>This is Ordered List...!!!</h1>
    <ol start="1" type="1">
        <li>HTML</li>
        <li>CSS</li>
        <li>JAVASCRIPT</li>
        <li>MONGO DB</li>
        <li>EXPRESS JS</li>
        <li>REACT JS</li>
        <li>NODE JS</li>
    </ol>
</body>
</html>
