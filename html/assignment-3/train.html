<!DOCTYPE html>
<html>
<head>
    <title>Train Ticket Booking</title>
</head>
<body>
    <h1><u>Train Ticket Booking </u></h1>
    <label>Full Name</label><br/>
    <input type="text" id="Firstname" placeholder="Enter First Name"/>
    <input type="text" id="Lastname" placeholder="Enter Last Name"/><br/><br/>

    <label for="mobileno">Mobile No</label><br/>
    <input type="text" id="mobileno" placeholder="+91 1234XXXXXX"/><br/><br/>

    <label for="emailid">Email-Id</label><br/>
    <input type="email" id="emailid" placeholder="Enter email-id"/><br/><br/>

    <label>Gender</label><br/>
    <select>
        <option>Choose Gender:</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
    </select><br/><br/>

    <label for="age">Age</label><br/>
    <input type="text" id="age" placeholder="Enter Age"/><br/><br/>

    <label for="from">From:</label>
    <input type="text" id="from"/>
    <label for="to">To:</label>
    <input type="text" id="to"/><br/><br/> 
    
    <label>Choose Class</label><br/>
    <input type="radio" id="firstclass"/>
    <label for="firstclass">First Class AC </label><br/>
     <input type="radio" id="sleeper"/>
    <label for="Sleeper">Sleeper Class</label><br/>
     <input type="radio" id="Second"/>
    <label for="Second">Second Sitting</label><br/>
     <input type="radio" id="General"/>
    <label for="General">General Unreserved</label><br/><br/>


    <label for="date"> Reservation Date</label><br/>
    <input type="date" id="date"/><br/><br/>

    <label for="time">Time</label><br/>
    <input type="time" id="time"/><br/><br/>

    <input type="button" value="Payment"/><br/><br/>

    <input type="submit" value="Confirm Ticket"/>
</body>
</html>
