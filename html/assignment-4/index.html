<!DOCTYPE html>
<html>
<head>
    <title>Audio And Video Tag</title>
</head>
<body>
    <h1>THIS IS VIDEO TAG</h1>
    <Video height="300"controls autoplay muted loop>
        <source src="./../image/Big-Bunny-video.mp4"type="Video/mp4"/>
    </Video>

    <hr/>

    <h1>THIS IS AUDIO TAG</h1>
    <audio controls muted autoplay loop>
        <source src="./../image/Sample-audio.mp3"type="audio/mp3"/>
    </audio>
</body>
</html>
