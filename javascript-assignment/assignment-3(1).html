<!DOCTYPE html>
<html lang="en">
<head>
    <title>Celsius to Fahrenheit Converter</title>
</head>
<body>
    <script>
        const celsius = prompt("Enter temperature in Celsius:");
        const fahrenheit = (celsius * 9/5) + 32;
        console.log(`${celsius}°C is equal to ${fahrenheit}°F`);
    </script>
</body>
</html>
