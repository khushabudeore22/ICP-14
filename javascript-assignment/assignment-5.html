<!DOCTYPE html>
<html lang="en">

<head>
    <title>odd numbers</title>
</head>

<body>
    <script>
        let n = parseInt(prompt("Enter a number:"));

        for (let i = 1; i <= n; i++) {
            if (i % 2 !== 0) {
                console.log(i);
            }
        }

    </script>
</body>

</html>
