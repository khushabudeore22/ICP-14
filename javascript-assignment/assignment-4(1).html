<!DOCTYPE html>
<html lang="en">

<head>
    <title>Even Odd</title>
</head>

<body>
    <script>
        let num = parseInt(prompt("Enter a number"));

        if (num % 2 === 0) {
            console.log("The number is Even");
        } else {
            console.log("The number is Odd");
        }
    </script>
</body>
</html>
