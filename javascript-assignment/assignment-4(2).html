<!DOCTYPE html>
<html lang="en">

<head>
    <title>Grade based On marks</title>
</head>

<body>
    <script>
        let marks = parseInt(prompt("Enter your marks"));

        if (marks >= 75) {
            console.log("Grade: Distinction");
        } else if (marks >= 60) {
            console.log("Grade: First Class");
        } else if (marks >= 40) {
            console.log("Grade: Pass");
        } else {
            console.log("Grade: Fail");
        }

    </script>
</body>

</html>
