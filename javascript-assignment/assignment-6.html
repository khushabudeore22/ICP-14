<!DOCTYPE html>
<html>
<head>
    <title>Binary Search in JavaScript</title>
</head>
<body>
<h2>Binary Search Example</h2>
<script>
    const arr = [
        2, 7, 13, 14, 20, 24, 27, 29, 35, 38,
        40, 44, 45, 46, 50, 55, 62, 78
    ];

    const key = 78;
    let start = 0;
    let end = arr.length - 1;
    let index = -1;

    while (start <= end) {
        let mid = Math.floor((start + end) / 2);

        if (arr[mid] === key) {
            index = mid;
            break;
        } else if (key > arr[mid]) {
            start = mid + 1;
        } else {
            end = mid - 1;
        }
    }

    if (index !== -1) {
        console.log("Element found at index:", index);
    } else {
        console.log("Element not found");
    }
</script>
</body>
</html>
