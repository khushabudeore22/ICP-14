<!DOCTYPE html>
<html lang="en">
<head>
    <title>User Details</title>
</head>
<body>
    <script>
        const name = prompt("Please enter your name:");

        const ageInput = prompt("Please enter your age:");
        const age = parseInt(ageInput);


        const marksInput = prompt("Please enter your marks:");
        const marks = parseFloat(marksInput);

        const message = `Hello, ${name}! You are ${age} years old and you got ${marks} % marks in your exam.`;

        alert(message);
    </script>
</body>
</html>
