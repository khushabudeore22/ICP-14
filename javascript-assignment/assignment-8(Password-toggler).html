<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Toggler</title>
    <style>
        body{
            background-image: linear-gradient(to top, #accbee 0%, #e7f0fd 100%);
            min-height: 100vh;
        }
        .img-toggle{
            height: 30px;
            cursor: pointer;      
        }
        .password-container{
            
            display: flex;
            align-items: center;
            border:1px solid #ccc;
            width: fit-content;
            padding: 0px 5px;
            border-radius: 9px;
            background-color: white;  
        }
        .input-password{
            border: none;
            outline: none;
            padding: 10px;
            font-size: 16px;   
        }

    </style>
</head>
<body>
    <div class="password-container">
     <input type="password" placeholder="Enter Password"   class="input-password" id="password"/>
     <img src="view.png" class="img-toggle" id="toggle" onclick="toggle()">
    </div>

    <script>
        const passwordElement = document.getElementById("password");
        const toggleElement = document.getElementById("toggle");

        function toggle() {
            if(passwordElement.type == "password"){
                passwordElement.type = "text";
                toggleElement.src ="hide.png"
            }else{
                passwordElement.type = "password";
                toggleElement.src ="show.png"
            }
        }
    </script>

</body>
</html>
