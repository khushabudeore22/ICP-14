<!DOCTYPE html>
<html lang="en">
<head>
    <title>Area of Circle</title>
</head>
<body>
    <script>
        const radius = parseInt(prompt("Enter the radius of the circle:"));
        const area = 3.14 * radius * radius;
        console.log(`The area of the circle is: ${area}`);
    </script>
</body>
</html>
