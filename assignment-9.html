<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dice Roller</title>
  <style>
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: Arial, sans-serif;
    }

    .container {
      background: white;
      padding: 30px 40px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h1 {
      margin-bottom: 20px;
      color: #333;
    }

    .dice {
      font-size: 100px;
      margin: 20px 0;
      transition: transform 0.3s ease;
    }

    .roll {
      transform: rotate(360deg);
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #5a67d8;
    }

    p {
      margin-top: 15px;
      font-size: 18px;
      color: #444;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🎲 Dice Roller</h1>
    <div id="dice" class="dice">⚀</div>
    <button onclick="rollDice()">Roll Dice</button>
    <p id="result">Result: 1</p>
  </div>

  <script>
    const diceFaces = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];

    function rollDice() {
      const dice = document.getElementById("dice");
      const result = document.getElementById("result");

      dice.classList.add("roll");

      setTimeout(() => {
        const randomNumber = Math.floor(Math.random() * 6);
        dice.textContent = diceFaces[randomNumber];
        result.textContent = "Result: " + (randomNumber + 1);
        dice.classList.remove("roll");
      }, 300);
    }
  </script>

</body>
</html>
